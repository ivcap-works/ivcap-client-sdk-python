site_name: IVCAP Client SDK (Python)
site_description: Python SDK for interacting with IVCAP deployments — discover services, run jobs, manage artifacts and metadata
site_author: CSIRO
site_url: https://ivcap-works.github.io/ivcap-client-sdk-python/
repo_url: https://github.com/ivcap-works/ivcap-client-sdk-python
repo_name: ivcap-client-sdk-python
edit_uri: edit/main/docs/docs/
docs_dir: docs
site_dir: site
copyright: Copyright &copy; 2022-2026 CSIRO

hooks:
  - hooks.py

theme:
  name: material
  custom_dir: overrides
  logo: img/logo.svg
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [".."]
          options:
            docstring_style: google
            docstring_options:
              returns_multiple_items: false
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            filters:
              - "!^_"
            show_if_no_docstring: false
  - llmstxt-md:
      enable_markdown_urls: true
      enable_llms_txt: true
      enable_llms_full: true
      markdown_description: |
        ivcap_client is a Python SDK for interacting with IVCAP
        (Intelligent Visual Computing and Analytics Platform) deployments.
        Use it to discover services, submit jobs, manage artifacts, read/write
        Aspects in the DataFabric, and orchestrate multi-agent pipelines.
        All list methods return iterators; authentication is via JWT token or environment variables.
      sections:
        Getting Started:
          - getting-started/installation.md
          - getting-started/quick-start.md
          - getting-started/authentication.md
        Guides:
          - guides/services.md
          - guides/jobs.md
          - guides/artifacts.md
          - guides/aspects.md
          - guides/collections.md
          - guides/async-usage.md
          - guides/error-handling.md
          - guides/agents.md
          - guides/search.md
        API Reference:
          - api/ivcap.md
          - api/service.md
          - api/job.md
          - api/artifact.md
          - api/aspect.md
          - api/collection.md
          - api/exceptions.md
        Examples:
          - examples/services.md
          - examples/jobs.md
          - examples/artifacts.md
          - examples/aspects.md
          - examples/collections.md
          - examples/async-parallel.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [".."]
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - css/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - js/mermaid-init.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Authentication: getting-started/authentication.md
  - Guides:
    - Overview: guides/overview.md
    - Discovering Services: guides/services.md
    - Running Jobs: guides/jobs.md
    - Working with Artifacts: guides/artifacts.md
    - The Datafabric & Aspects: guides/aspects.md
    - Collections: guides/collections.md
    - Async Usage: guides/async-usage.md
    - Error Handling: guides/error-handling.md
    - Agent Integration: guides/agents.md
    - Search (Datalog): guides/search.md
  - API Reference:
    - Overview: api/overview.md
    - IVCAP Client: api/ivcap.md
    - Service: api/service.md
    - Job: api/job.md
    - Artifact: api/artifact.md
    - Aspect: api/aspect.md
    - Collection: api/collection.md
    - Exceptions: api/exceptions.md
  - Examples:
    - Overview: examples/overview.md
    - Service Discovery: examples/services.md
    - Job Workflows: examples/jobs.md
    - Artifacts: examples/artifacts.md
    - Aspects & Search: examples/aspects.md
    - Collections: examples/collections.md
    - Async & Parallel: examples/async-parallel.md
  - Reference:
    - Environment Variables: reference/environment-variables.md
    - Glossary: reference/glossary.md
  - Agent Guide: agent.md
  - Community:
    - Contributing: community/contributing.md
    - Code of Conduct: community/conduct.md
