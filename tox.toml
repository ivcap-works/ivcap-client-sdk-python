requires = ["tox>=4"]
env_list = ["3.14", "3.13", "3.12", "3.11", "docs"]


[env_run_base]
description = "run unit tests"
deps = [
    "pytest ~= 7.1",
]
commands = [["pytest", { replace = "posargs", default = ["tests"], extend = true }]]

[env.docs]
deps = []
skip_install = true
commands_pre =[
    ["poetry", "install", "--with", "dev"]
]
allowlist_externals = ["poetry"]
commands = [["python", "-m", "sphinx", "docs", "docs/_build"]]
